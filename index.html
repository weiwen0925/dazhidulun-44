<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:17px;line-height:1.8;scroll-behavior:smooth;
  scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}

/* sidebar */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);writing-mode:horizontal-tb;text-orientation:mixed;
  text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;
  letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;padding:6px 0;width:100%;align-items:center;}
.sb-item{display:flex;flex-direction:column;align-items:center;
  text-decoration:none;color:var(--sbText);
  padding:3px 4px;border-radius:6px;
  transition:background .2s,color .2s,box-shadow .2s;cursor:pointer;width:88%;}
.sb-item:hover{background:rgba(184,134,11,.15);color:var(--goldL);}
.sb-circle{display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;
  background:rgba(184,134,11,.18);color:var(--goldL);
  font-family:"Noto Sans TC",sans-serif;font-weight:600;font-size:14px;
  margin-bottom:3px;border:1px solid rgba(212,196,168,.25);
  transition:background .2s,box-shadow .2s,color .2s;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:10.5px;letter-spacing:.5px;
  text-align:center;line-height:1.2;opacity:.85;}
.sb-item.active .sb-circle{background:var(--gold);color:#fff;
  box-shadow:0 0 12px rgba(184,134,11,.65),0 0 24px rgba(184,134,11,.35);}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;font-weight:600;}

/* progress capsule */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* main column */
.main{margin-left:var(--sbW);min-height:100vh;}
.site-hero{position:relative;background:var(--headGrad);
  color:#f5e8c8;padding:80px 24px 70px;text-align:center;
  overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;
  font-size:300px;color:rgba(245,232,200,.04);
  top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:"Noto Serif TC",serif;font-weight:900;letter-spacing:30px;
  pointer-events:none;white-space:nowrap;}
.hero-title{position:relative;z-index:1;
  font-size:50px;font-weight:900;letter-spacing:8px;
  color:var(--goldL);margin:0 0 14px;
  text-shadow:0 2px 10px rgba(0,0,0,.4);}
.hero-subtitle{position:relative;z-index:1;
  font-size:18px;color:#f5e8c8;opacity:.92;
  letter-spacing:3px;margin:6px 0;font-weight:400;}
.hero-sub{position:relative;z-index:1;font-size:16px;
  color:#e8d8b8;opacity:.82;letter-spacing:1.5px;margin-top:8px;font-weight:300;}
.hero-meta{position:relative;z-index:1;
  font-size:14px;color:#d8c8a8;opacity:.7;
  letter-spacing:1.2px;margin-top:18px;font-family:"Noto Sans TC",sans-serif;}
.hero-range{position:relative;z-index:1;
  display:inline-block;margin-top:22px;padding:6px 22px;
  border:1px solid rgba(184,134,11,.45);border-radius:20px;
  font-size:14px;letter-spacing:3px;color:var(--gold);
  font-family:"Noto Sans TC",sans-serif;}

/* preface */
.preface{max-width:900px;margin:0 auto;padding:60px 28px 30px;}
.preface-title{font-size:26px;letter-spacing:8px;text-align:center;
  color:var(--accent);font-weight:700;margin-bottom:24px;}
.preface-title::after{content:"";display:block;width:60px;height:2px;
  background:var(--gold);margin:14px auto 0;}
.preface p{font-size:16px;line-height:2;color:var(--text2);
  margin:0 0 14px;text-align:justify;text-indent:2em;}

/* TOC */
.toc-section{max-width:1100px;margin:0 auto;padding:40px 28px 30px;}
.toc-title{font-size:30px;letter-spacing:14px;text-align:center;
  color:var(--accent);font-weight:700;margin:0 0 8px;}
.toc-title::after{content:"";display:block;width:80px;height:2px;
  background:var(--gold);margin:14px auto 0;}
.toc-desc{font-size:15px;letter-spacing:3px;text-align:center;
  color:var(--text2);margin:18px 0 30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;margin-top:24px;}
.toc-card{background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:20px 22px;text-decoration:none;color:var(--text);
  display:flex;gap:16px;align-items:flex-start;
  box-shadow:0 2px 6px rgba(91,58,41,.06);
  transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;}
.toc-card:hover{transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(91,58,41,.15);border-color:var(--gold);}
.toc-num{flex:0 0 36px;height:36px;border-radius:50%;
  background:var(--gold);color:#fff;display:flex;
  align-items:center;justify-content:center;font-size:16px;font-weight:700;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:1px;
  box-shadow:0 2px 6px rgba(184,134,11,.4);}
.toc-body{flex:1;}
.toc-name{font-size:17px;font-weight:700;color:var(--accent);
  line-height:1.5;letter-spacing:1.5px;margin-bottom:4px;}
.toc-sub{font-size:13.5px;color:var(--text2);line-height:1.6;
  letter-spacing:.5px;opacity:.85;}

/* chapter */
.chapter{margin:60px 0 0;}
.ch-head{background:var(--headGrad);color:#fff;
  padding:60px 28px 50px;text-align:center;
  position:relative;overflow:hidden;}
.ch-head::after{content:"";display:block;width:60px;height:2px;
  background:var(--goldL);margin:22px auto 0;}
.ch-num{font-size:15px;letter-spacing:6px;color:var(--goldL);
  font-family:"Noto Sans TC",sans-serif;
  text-transform:uppercase;margin-bottom:18px;font-weight:500;}
.ch-name{font-size:34px;font-weight:700;letter-spacing:8px;
  color:#fff;margin:0;text-shadow:0 2px 12px rgba(0,0,0,.45);line-height:1.45;}
.ch-sub{font-size:15px;letter-spacing:3px;color:#e8d8b8;opacity:.85;
  margin-top:16px;font-weight:300;}
.ch-body{max-width:980px;margin:0 auto;padding:28px;background:var(--bg);}

/* bridge */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;text-align:justify;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;
  background:#fffdf7;border:1px solid var(--border);
  border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;min-height:180px;}

/* next-link */
.next-link{display:inline-block;margin:18px auto 0;
  padding:10px 22px;border:1.5px solid var(--gold);border-radius:30px;
  color:var(--gold);text-decoration:none;font-family:"Noto Sans TC",sans-serif;
  letter-spacing:3px;font-size:14.5px;
  transition:background .2s,color .2s;}
.next-link:hover{background:var(--gold);color:#fff;}
.next-link-wrap{text-align:center;margin:30px 0 16px;}

/* back to top */
#backTop{position:fixed;right:24px;bottom:80px;
  width:44px;height:44px;border-radius:50%;border:0;
  background:var(--gold);color:#fff;font-size:22px;cursor:pointer;
  box-shadow:0 4px 12px rgba(184,134,11,.5);
  display:none;z-index:110;}
#backTop.show{display:block;}

/* footer */
.site-footer{background:#1e1a14;color:#d4c4a8;
  padding:36px 28px;text-align:center;margin-top:60px;}
.site-footer p{font-size:14px;letter-spacing:2px;
  color:#a89878;margin:6px 0;font-family:"Noto Sans TC",sans-serif;}

/* mobile */
#sbToggle{position:fixed;left:14px;top:14px;z-index:130;
  background:var(--sbBg);color:var(--gold);
  border:1px solid var(--gold);border-radius:8px;
  width:42px;height:42px;font-size:20px;cursor:pointer;display:none;}
@media (max-width:900px){
  #sbToggle{display:block;}
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.show{transform:translateX(0);}
  .main{margin-left:0;}
  .hero-title{font-size:36px;letter-spacing:4px;}
  .ch-name{font-size:24px;letter-spacing:4px;}
  .ch-body{padding:20px 14px;}
}
@media (max-width:600px){
  html,body{font-size:15.5px;}
  .hero-title{font-size:28px;letter-spacing:3px;}
}

/* ============ 1.2x 字級放大（buddhist-text-html 新卷預設）============ */
body{font-size:20px!important;}
.hero-title,.site-hero h1{font-size:56px!important;}
.hero-subtitle,.site-hero .hero-subtitle{font-size:20px!important;}
.hero-sub,.site-hero .hero-sub,.hero-meta{font-size:18px!important;}
.hero-range{font-size:17px!important;}
.preface p,.preface-text p{font-size:19px!important;line-height:2.1!important;}
.preface h2,.preface-title{font-size:30px!important;}
.toc-title{font-size:34px!important;}
.toc-desc{font-size:17px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}
.toc-num{font-size:17px!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.bridge-label{font-size:12.5px!important;letter-spacing:2.2px!important;}
.ch-num{font-size:18px!important;}
.ch-name{font-size:34px!important;}
.ch-sub,.ch-desc,.ch-subtitle{font-size:17px!important;}
.next-link{font-size:17px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}
.read-progress .rp-bar{width:148px!important;height:4px!important;}
.read-progress .rp-pct{font-size:13px!important;}
.read-progress .rp-label{font-size:12px!important;}
.sb-circle{font-size:15px!important;}
.sb-label{font-size:11.5px!important;}
.site-footer,.site-footer p{font-size:15px!important;}

<script>
// 進度膠囊
var rpFill=document.getElementById('rpFill');
var rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});
updateProgress();

// 接近頁尾淡出
(function(){
  var cap=document.getElementById('readProgress');
  if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[];
  var f1=document.querySelector('[data-wy-notice="v2"]');
  if(f1)targets.push(f1);
  var f2=document.querySelector('.site-footer');
  if(f2)targets.push(f2);
  if(!targets.length)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;});
      setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  } else {
    var check=function(){
      var dh=document.documentElement.scrollHeight;
      var sb=window.scrollY+window.innerHeight;
      setHide(dh-sb<240);
    };
    window.addEventListener('scroll',check,{passive:true});
    check();
  }
})();

// iframe 自動高度（解耦 viewport 與 content）
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body)return;
    d.body.style.minHeight='0';
    d.body.style.height='auto';
    if(d.documentElement){
      d.documentElement.style.minHeight='0';
      d.documentElement.style.height='auto';
    }
    var h=d.body.scrollHeight;
    if(h>100){
      f.style.height=h+'px';
      f.style.minHeight='0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries<30)setTimeout(tick,200);
  }
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){
    tick();
  } else {
    f.addEventListener('load',tick);
  }
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){
  clearTimeout(rzT);
  rzT=setTimeout(resizeAllFrames,200);
});

// 錨點防錯跳
document.addEventListener('click',function(e){
  var a=e.target;
  while(a&&a.tagName!=='A')a=a.parentElement;
  if(!a)return;
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);
  var el=document.getElementById(id);
  if(!el)return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});
  },60);
},true);

// 前 15 秒輪詢
var _rt=0,_riv=setInterval(function(){
  _rt++;resizeAllFrames();
  if(_rt>50)clearInterval(_riv);
},300);

// 側欄高亮
function updateActiveSidebar(){
  var chapters=document.querySelectorAll('.chapter');
  var viewH=window.innerHeight;
  var activeId=null;
  chapters.forEach(function(c){
    var rect=c.getBoundingClientRect();
    if(rect.top<viewH*0.35) activeId=c.id;
  });
  document.querySelectorAll('.sb-item').forEach(function(item){
    item.classList.toggle('active',item.dataset.target===activeId);
  });
}
window.addEventListener('scroll',updateActiveSidebar,{passive:true});
updateActiveSidebar();

// sticky brand click
var sbBrand=document.getElementById('sbBrand');
if(sbBrand){
  sbBrand.addEventListener('click',function(e){
    e.preventDefault();
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

// 漢堡選單
var sbToggle=document.getElementById('sbToggle');
var sb=document.getElementById('sb');
if(sbToggle&&sb){
  sbToggle.addEventListener('click',function(){sb.classList.toggle('show');});
}

// 回頂按鈕
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){
  if(backTop)backTop.classList.toggle('show',window.scrollY>600);
},{passive:true});
if(backTop){
  backTop.addEventListener('click',function(){
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

// 外層防複製
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-44-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
