<!DOCTYPE html>

<html lang="zh-Hant">

<title>大智度論 · 第四十四卷 · 1-5品彙整</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:88px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--primary:#2C1810;--primary-light:#5B3A29;--shadow:rgba(91,58,41,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg);color:var(--text);font-size:17px;line-height:1.8;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
img{-webkit-user-drag:none;}
/* ───────── sidebar ───────── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;width:0;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;
  letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:10px;width:100%;align-items:center;padding-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:var(--sbText);padding:4px 4px;width:100%;
  cursor:pointer;transition:all .25s;}
.sb-item:hover{color:var(--goldL);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  border:1.5px solid rgba(212,196,168,.45);
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Serif TC",serif;font-size:15px;font-weight:600;
  transition:all .25s;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:10.5px;
  letter-spacing:.5px;opacity:.8;text-align:center;line-height:1.3;}
.sb-item.active .sb-circle{
  background:var(--gold);border-color:var(--goldL);color:#fff;
  box-shadow:0 0 12px rgba(184,134,11,.55);}
.sb-item.active{color:var(--goldL);}
.sb-item.active .sb-label{opacity:1;}
#sbToggle{display:none;position:fixed;left:14px;top:14px;z-index:130;
  width:42px;height:42px;border-radius:10px;border:1px solid var(--border);
  background:rgba(30,26,20,.92);color:var(--goldL);font-size:19px;cursor:pointer;}
/* ───────── progress capsule ───────── */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
  transition:opacity .45s ease, transform .45s ease;
}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}
/* ───────── main / hero ───────── */
.main{margin-left:var(--sbW);}
.site-hero{
  background:var(--headGrad);color:#f5ecd8;text-align:center;
  padding:92px 24px 78px;position:relative;overflow:hidden;}
.site-hero::before{
  content:"般若";position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);font-size:340px;font-weight:900;
  color:rgba(255,255,255,.035);pointer-events:none;white-space:nowrap;
  font-family:"Noto Serif TC",serif;}
.hero-meta{font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:6px;color:var(--goldL);opacity:.9;margin-bottom:18px;}
.hero-title{font-size:46px;font-weight:900;letter-spacing:8px;
  color:var(--goldL);margin-bottom:16px;
  text-shadow:0 2px 14px rgba(0,0,0,.4);}
.hero-subtitle{font-size:19px;letter-spacing:3px;color:#e8dcc0;margin-bottom:22px;}
.hero-range{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;color:#d4c4a8;
  border:1px solid rgba(212,196,168,.4);border-radius:24px;
  padding:7px 26px;}
/* ───────── preface ───────── */
.preface{max-width:860px;margin:46px auto 8px;padding:0 28px;}
.preface-title{text-align:center;font-size:25px;font-weight:700;
  letter-spacing:10px;color:var(--accent);margin-bottom:22px;}
.preface-title::after{content:"";display:block;width:64px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:14px auto 0;}
.preface p{font-size:16px;line-height:2.05;color:var(--text2);
  text-align:justify;margin-bottom:14px;}
.preface strong{color:var(--accent-red);font-weight:700;}
/* ───────── toc ───────── */
.toc-section{max-width:1100px;margin:38px auto 30px;padding:0 28px;}
.toc-title{text-align:center;font-size:28px;font-weight:700;
  letter-spacing:12px;color:var(--accent);margin-bottom:8px;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;
  font-size:14px;color:var(--text-muted);letter-spacing:2px;margin-bottom:26px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
.toc-card{display:flex;align-items:flex-start;gap:14px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px 18px;text-decoration:none;color:var(--text);
  transition:all .25s;box-shadow:0 1px 3px var(--shadow);}
.toc-card:hover{transform:translateY(-3px);border-color:var(--gold);
  box-shadow:0 6px 18px rgba(91,58,41,.14);}
.toc-num{flex:0 0 38px;width:38px;height:38px;border-radius:50%;
  background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Serif TC",serif;font-size:16px;font-weight:700;}
.toc-body{flex:1;}
.toc-name{font-size:16.5px;font-weight:700;color:var(--accent);line-height:1.6;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  color:var(--text-muted);margin-top:4px;line-height:1.6;letter-spacing:.5px;}
/* ───────── chapters ───────── */
.chapter{margin:34px 0 0;}
.ch-head{background:var(--headGrad);color:#f5ecd8;text-align:center;
  padding:46px 24px 40px;position:relative;}
.ch-head::after{content:"";position:absolute;left:50%;bottom:18px;
  transform:translateX(-50%);width:120px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:15px;
  letter-spacing:4px;color:var(--goldL);opacity:.92;margin-bottom:12px;}
.ch-name{font-size:30px;font-weight:900;letter-spacing:6px;color:#f8f1de;}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:2px;color:#cdbf9f;margin-top:12px;}
.ch-body{max-width:980px;margin:0 auto;padding:30px 26px 36px;}
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:11px;background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;text-align:justify;}
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;
  min-height:180px;}
.next-link{display:block;text-align:center;margin:8px auto 0;
  font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:2px;
  color:var(--accent);text-decoration:none;padding:12px 0;
  transition:color .25s;}
.next-link:hover{color:var(--gold);}
/* ───────── footer ───────── */
.site-footer{background:var(--sbBg);color:#a89878;text-align:center;
  padding:44px 24px 52px;margin-top:48px;
  font-family:"Noto Sans TC",sans-serif;font-size:13px;
  letter-spacing:2px;line-height:2.2;}
.site-footer .ft-gold{color:var(--goldL);font-size:15px;letter-spacing:3px;}
/* ───────── backTop ───────── */
#backTop{position:fixed;right:22px;bottom:24px;width:44px;height:44px;
  border-radius:50%;border:1px solid var(--border);
  background:rgba(30,26,20,.92);color:var(--goldL);font-size:18px;
  cursor:pointer;z-index:125;opacity:0;pointer-events:none;
  transition:opacity .3s;}
#backTop.show{opacity:1;pointer-events:auto;}
/* ───────── RWD ───────── */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .hero-title{font-size:32px;letter-spacing:4px;}
  .site-hero{padding:72px 18px 56px;}
  .ch-name{font-size:24px;letter-spacing:3px;}
  .ch-body{padding:24px 14px 28px;}
  .toc-grid{grid-template-columns:1fr;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:26px;}
}

/* ============ 1.2x 字級放大（buddhist-text-html 預設）============ */
body{font-size:20px!important;}
.hero-title,.site-hero h1{font-size:56px!important;}
.hero-subtitle,.site-hero .hero-subtitle{font-size:20px!important;}
.hero-sub,.site-hero .hero-sub,.hero-meta{font-size:18px!important;}
.hero-range{font-size:17px!important;}
.preface p,.preface-text p{font-size:19px!important;line-height:2.1!important;}
.preface h2,.preface-title{font-size:30px!important;}
.toc-title{font-size:34px!important;}
.toc-desc{font-size:17px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}
.toc-num{font-size:17px!important;}
.toc-sub{font-size:14px!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.bridge-label{font-size:12.5px!important;letter-spacing:2.2px!important;}
.ch-num{font-size:18px!important;}
.ch-name{font-size:34px!important;}
.ch-sub,.ch-desc,.ch-subtitle{font-size:17px!important;}
.next-link{font-size:17px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}
.read-progress .rp-bar{width:148px!important;height:4px!important;}
.read-progress .rp-pct{font-size:13px!important;}
.read-progress .rp-label{font-size:12px!important;}
.sb-circle{font-size:15px!important;}
.sb-label{font-size:11.5px!important;}
.site-footer,.site-footer p{font-size:15px!important;}
</style>

<button id="backTop" title="回到頂部">↑</button>
<script>
/* sidebar toggle */
var sbToggle=document.getElementById('sbToggle'),sb=document.getElementById('sb');
if(sbToggle){sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});}
document.addEventListener('click',function(e){
  if(window.innerWidth<=900&&sb.classList.contains('open')&&!sb.contains(e.target)&&e.target!==sbToggle){
    sb.classList.remove('open');}
});
/* sb-brand back to top */
var sbBrand=document.getElementById('sbBrand');
if(sbBrand){sbBrand.addEventListener('click',function(e){
  e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});}
/* backTop */
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){
  if(backTop)backTop.classList.toggle('show',window.scrollY>600);
},{passive:true});
if(backTop)backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
/* progress */
var rpFill=document.getElementById('rpFill');
var rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});
updateProgress();
/* progress capsule fade near footer */
(function(){
  var cap=document.getElementById('readProgress');
  if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[];
  var f1=document.querySelector('[data-wy-notice="v2"]');
  if(f1)targets.push(f1);
  var f2=document.querySelector('.site-footer');
  if(f2)targets.push(f2);
  if(!targets.length)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;});
      setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  }else{
    var check=function(){
      var dh=document.documentElement.scrollHeight;
      var sbm=window.scrollY+window.innerHeight;
      setHide(dh-sbm<240);
    };
    window.addEventListener('scroll',check,{passive:true});
    check();
  }
})();
/* sidebar highlight */
var chs=document.querySelectorAll('section.chapter');
var sbItems=document.querySelectorAll('.sb-item');
function highlight(){
  var idx=-1,vh=window.innerHeight*0.35;
  chs.forEach(function(sec,i){
    if(sec.getBoundingClientRect().top<vh)idx=i;
  });
  sbItems.forEach(function(it,i){it.classList.toggle('active',i===idx);});
  if(idx>=0&&sbItems[idx]){
    var it=sbItems[idx],r=it.getBoundingClientRect(),sr=sb.getBoundingClientRect();
    if(r.top<sr.top+60||r.bottom>sr.bottom-20){
      sb.scrollTo({top:it.offsetTop-sb.clientHeight/2,behavior:'smooth'});
    }
  }
}
window.addEventListener('scroll',highlight,{passive:true});
highlight();
/* iframe auto height — only body.scrollHeight, no buffer */
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body)return;
    d.body.style.minHeight='0';
    d.body.style.height='auto';
    if(d.documentElement){
      d.documentElement.style.minHeight='0';
      d.documentElement.style.height='auto';
    }
    var h=d.body.scrollHeight;
    if(h>100){
      f.style.height=h+'px';
      f.style.minHeight='0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries<30)setTimeout(tick,200);
  }
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}
  else{f.addEventListener('load',tick);}
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){
  clearTimeout(rzT);
  rzT=setTimeout(resizeAllFrames,200);
});
/* anchor click: force frame resize then smooth scroll */
document.addEventListener('click',function(e){
  var a=e.target;
  while(a&&a.tagName!=='A')a=a.parentElement;
  if(!a)return;
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);
  var el=document.getElementById(id);
  if(!el)return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});
  },60);
},true);
/* global recalc 15s */
var _rt=0,_riv=setInterval(function(){
  _rt++;resizeAllFrames();
  if(_rt>50)clearInterval(_riv);
},300);
/* anti-copy outer */
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy44dzdl-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
